services:
  ros-humble-dev:
    build: .
    image: ros2-humble:latest
    command: bash
    stdin_open: true
    tty: true
    network_mode: "host"
    # runtime: nvidia
    privileged: true

    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_X11_NO_MITSHM=1
      - __NV_PRIME_RENDER_OFFLOAD=1
      - __GLX_VENDOR_LIBRARY_NAME=nvidia

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev/dri:/dev/dri
      # Mount the current directory to the workspace for development
      - .:/home/rosuser/ros2_ws

    working_dir: /home/rosuser/ros2_ws

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all
